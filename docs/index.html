<!doctype html>
<html lang="zh-CN">

    <title>面试 QA 文档</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />

  <body>
    <div class="ambient" aria-hidden="true"><i></i><i></i><i></i></div>
    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="cursor-ring" aria-hidden="true"></div>
    <div id="app">Loading...</div>
    <script>
      const pageReveal = (hook) => {
        hook.doneEach(() => {
          const el = document.querySelector(".markdown-section");
          if (!el) return;
          el.classList.remove("page-reveal");
          void el.offsetWidth;
          el.classList.add("page-reveal");
        });
      };

      const slugify = (str) => {
        return str
          .toLowerCase()
          .replace(/[^\w\u4e00-\u9fff\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");
      };

      window.$docsify = {
        name: "面试 QA 文档",
        repo: false,
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        plugins: [pageReveal],
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索文档...",
          noData: "未找到结果",
          depth: 3,
        },
        pagination: {
          previousText: "上一篇",
          nextText: "下一篇",
          crossChapter: true,
          crossChapterText: true,
        },
        copyCode: {
          buttonText: "Copy",
          errorText: "Error",
          successText: "OK",
        },
      };
    </script>

    <script>
      // Custom cursor + bubble click effect
      (() => {
        const dot = document.querySelector(".cursor-dot");
        const ring = document.querySelector(".cursor-ring");
        if (!dot || !ring) return;
        if (window.matchMedia("(pointer: coarse)").matches) {
          dot.style.display = "none";
          ring.style.display = "none";
          return;
        }
        let mx = 0,
          my = 0,
          rx = 0,
          ry = 0;
        document.addEventListener("mousemove", (e) => {
          mx = e.clientX;
          my = e.clientY;
          dot.style.transform = `translate(${mx - 4}px, ${my - 4}px)`;
        });
        (function loop() {
          rx += (mx - rx) * 0.15;
          ry += (my - ry) * 0.15;
          ring.style.transform = `translate(${rx - 16}px, ${ry - 16}px)`;
          requestAnimationFrame(loop);
        })();
        document.addEventListener("mousedown", () => {
          ring.classList.add("clicking");
          const bubble = document.createElement("span");
          bubble.className = "click-bubble";
          bubble.style.left = mx + "px";
          bubble.style.top = my + "px";
          document.body.appendChild(bubble);
          bubble.addEventListener("animationend", () => bubble.remove());
        });
        document.addEventListener("mouseup", () =>
          ring.classList.remove("clicking"),
        );
        document.querySelectorAll("a, button, .sidebar-nav a").forEach((el) => {
          el.addEventListener("mouseenter", () =>
            ring.classList.add("hovering"),
          );
          el.addEventListener("mouseleave", () =>
            ring.classList.remove("hovering"),
          );
        });
        new MutationObserver(() => {
          document
            .querySelectorAll("a, button, .sidebar-nav a")
            .forEach((el) => {
              if (el._cursorBound) return;
              el._cursorBound = true;
              el.addEventListener("mouseenter", () =>
                ring.classList.add("hovering"),
              );
              el.addEventListener("mouseleave", () =>
                ring.classList.remove("hovering"),
              );
            });
        }).observe(document.body, { childList: true, subtree: true });
      })();
    </script>
