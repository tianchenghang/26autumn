<nav class="px-2">
  {{forOf sidebarGroups as group}}
  <div class="mb-3 last:mb-1">
    {{if group.text}}
    <p
      class="text-base-content/50 mb-1 px-2 text-xs font-semibold tracking-wider uppercase"
    >
      {{=group.text}}
    </p>
    {{/if}}
    <ul class="menu menu-xs gap-0 p-0">
      {{forOf group.items as item}}
      <li>
        <a
          class="{{=item.itemClass}}"
          data-href="{{=item.link}}"
          @click="navigateTo()"
        >
          {{=item.text}}
        </a>
      </li>
      {{/forOf}}
    </ul>
  </div>
  {{/forOf}}
</nav>
