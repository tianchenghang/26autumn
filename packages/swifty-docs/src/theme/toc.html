<div class="px-2">
  <p
    class="text-base-content/50 mb-1.5 px-2 text-xs font-semibold tracking-wider uppercase"
  >
    On this page
  </p>
  {{if headings.length > 0}}
  <ul class="menu menu-xs gap-0 p-0">
    {{forOf headings as heading}}
    <li class="{{=heading.liClass}}">
      <a
        class="{{=heading.itemClass}}"
        href="#{{=heading.slug}}"
        data-slug="{{=heading.slug}}"
        @click="scrollToHeading()"
      >
        {{=heading.text}}
      </a>
    </li>
    {{/forOf}}
  </ul>
  {{else}}
  <p class="text-base-content/30 px-2 text-xs">No headings</p>
  {{/if}}
</div>
