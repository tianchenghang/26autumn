<!-- Counter Component (updater version) -->
<div class="{{=styles['counter-updater']}}">
  <div class="{{=styles['counter-updater__label']}}">
    updater.set().digest()
  </div>
  <div class="{{=styles['counter-updater__display']}}">
    <div class="{{=styles['counter-updater__value']}}">{{=count}}</div>
    <div class="{{=styles['counter-updater__display-label']}}">
      current count
    </div>
  </div>

  <div class="{{=styles['counter-updater__step-row']}}">
    <label class="{{=styles['counter-updater__step-label']}}">Step</label>
    <input
      type="number"
      value="{{=step}}"
      @change="stepChange()"
      min="1"
      max="100"
      class="{{=styles['counter-updater__step-input']}}"
    />
  </div>

  <div class="{{=styles['counter-updater__actions']}}">
    <button
      @click="decrement()"
      class="{{=styles['counter-updater__button']}} {{=styles['counter-updater__button--primary']}}"
    >
      - {{=step}}
    </button>
    <button
      @click="reset()"
      class="{{=styles['counter-updater__button']}} {{=styles['counter-updater__button--secondary']}}"
    >
      Reset
    </button>
    <button
      @click="increment()"
      class="{{=styles['counter-updater__button']}} {{=styles['counter-updater__button--primary']}}"
    >
      + {{=step}}
    </button>
  </div>

  <div class="{{=styles['counter-updater__history-header']}}">
    <span class="{{=styles['counter-updater__history-label']}}">History</span>
    <button
      @click="clearHistory()"
      class="{{=styles['counter-updater__history-clear']}}"
    >
      Clear
    </button>
  </div>
  {{if history.length > 0}}
  <ul class="{{=styles['counter-updater__history-list']}}">
    {{forOf history as record}}
    <li class="{{=styles['counter-updater__history-item']}}">{{=record}}</li>
    {{/forOf}}
  </ul>
  {{else}}
  <p class="{{=styles['counter-updater__history-empty']}}">No history</p>
  {{/if}}
</div>
