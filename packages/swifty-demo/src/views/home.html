<!-- Home View Template -->
<div class="{{=styles['home-page']}}">
  <div class="{{=styles['home-page__container']}}">
    <h1 class="{{=styles['home-page__title']}}">{{=title}}</h1>
    <p class="{{=styles['home-page__description']}}">{{=description}}</p>

    <div class="{{=styles['home-page__card']}}">
      <h2 class="{{=styles['home-page__card-title']}}">Navigation</h2>
      <div class="{{=styles['home-page__actions']}}">
        <button
          @click="navigateTo({path: '/about'})"
          class="{{=styles['home-page__button']}} {{=styles['home-page__button--primary']}}"
        >
          About
        </button>
        <button
          @click="navigateTo({path: '/counter'})"
          class="{{=styles['home-page__button']}} {{=styles['home-page__button--sky']}}"
        >
          Counter
        </button>
        <button
          @click="navigateTo({path: '/cdn'})"
          class="{{=styles['home-page__button']}} {{=styles['home-page__button--primary']}}"
        >
          CDN Manager
        </button>
      </div>
    </div>

    <div class="{{=styles['home-page__card']}}">
      <div class="{{=styles['home-page__card-header']}}">
        <h2 class="{{=styles['home-page__card-title']}}">Store State</h2>
        <a
          @click="navigateTo({path: '/counter'})"
          class="{{=styles['home-page__link']}}"
        >
          modify
        </a>
      </div>
      <div class="{{=styles['home-page__store-grid']}}">
        <div
          class="{{=styles['home-page__store-item']}} {{=styles['home-page__store-item--emerald']}}"
        >
          <div class="{{=styles['home-page__store-value']}}">{{=count}}</div>
          <div class="{{=styles['home-page__store-label']}}">count</div>
        </div>
        <div
          class="{{=styles['home-page__store-item']}} {{=styles['home-page__store-item--sky']}}"
        >
          <div class="{{=styles['home-page__store-value']}}">{{=step}}</div>
          <div class="{{=styles['home-page__store-label']}}">step</div>
        </div>
      </div>
    </div>

    <div class="{{=styles['home-page__card']}}">
      <h2 class="{{=styles['home-page__card-title']}}">Interaction</h2>
      <button
        @click="showInfo({title: 'Notice', message: 'You clicked the button!'})"
        class="{{=styles['home-page__button']}} {{=styles['home-page__button--primary']}}"
      >
        Show Alert
      </button>
    </div>

    <div class="{{=styles['home-page__footer']}}">
      <p class="{{=styles['home-page__footer-app']}}">App: {{=appName}}</p>
      <p class="{{=styles['home-page__footer-time']}}">
        Time: {{=currentTime}}
      </p>
    </div>
  </div>
</div>
