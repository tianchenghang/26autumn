<!-- CDN View Template — wrapper for the embedded React CdnManager -->
<div class="{{=styles['cdn-page']}}">
  <div class="{{=styles['cdn-page__header']}}">
    <div class="{{=styles['cdn-page__header-left']}}">
      <div class="{{=styles['cdn-page__icon']}}">CDN</div>
      <div class="{{=styles['cdn-page__title-group']}}">
        <span class="{{=styles['cdn-page__title']}}">CDN Manager</span>
        <span class="{{=styles['cdn-page__subtitle']}}"
          >swifty-devtool · Module Federation</span
        >
      </div>
    </div>
    <button @click="goHome()" class="{{=styles['cdn-page__back-btn']}}">
      Back to Home
    </button>
  </div>

  <div class="{{=styles['cdn-page__content']}}">
    <!-- React component mount point — always present so MF import can
         append into it without being affected by template diff. -->
    <div data-role="cdn-mount" style="height: 100%; width: 100%"></div>

    {{if loading}}
    <div class="{{=styles['cdn-page__loading']}}">
      <div class="{{=styles['cdn-page__spinner']}}"></div>
      <p class="{{=styles['cdn-page__loading-text']}}">{{=loadingText}}</p>
    </div>
    {{/if}} {{if error}}
    <div class="{{=styles['cdn-page__error']}}">
      <p class="{{=styles['cdn-page__error-title']}}">
        Failed to load CDN Manager
      </p>
      <p class="{{=styles['cdn-page__error-detail']}}">{{=errorDetail}}</p>
    </div>
    {{/if}}
  </div>
</div>
