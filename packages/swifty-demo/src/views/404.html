<!-- 404 View Template -->
<div class="{{=styles['error-page']}}">
  <div class="{{=styles['error-page__content']}}">
    <div class="{{=styles['error-page__number']}}">404</div>
    <h1 class="{{=styles['error-page__title']}}">Page Not Found</h1>
    <p class="{{=styles['error-page__description']}}">
      The path
      <code class="{{=styles['error-page__code']}}">{{=path}}</code>
      does not exist
    </p>

    <button @click="goHome()" class="{{=styles['error-page__button']}}">
      Back to Home
    </button>
  </div>
</div>
